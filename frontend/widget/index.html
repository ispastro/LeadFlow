<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeadFlow - AI Sales Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000000;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Subtle gradient background effect */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 50% 50%, rgba(0, 112, 243, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(0, 112, 243, 0.02) 0%, transparent 25%),
        radial-gradient(circle at 80% 20%, rgba(0, 112, 243, 0.02) 0%, transparent 25%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 900px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 500;
      line-height: 1.4;
      color: #e5e5e5;
      margin-bottom: 16px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: clamp(16px, 3vw, 20px);
      color: #737373;
      margin-bottom: 48px;
      font-weight: 400;
    }

    .cta-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .btn {
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
    }

    .btn-primary {
      background: #e5e5e5;
      color: #000000;
    }

    .btn-primary:hover {
      background: #ffffff;
    }

    .btn-secondary {
      background: transparent;
      color: #e5e5e5;
      border: 1px solid #404040;
    }

    .btn-secondary:hover {
      border-color: #525252;
    }

    .features {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      color: #737373;
      font-size: 14px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .check-icon {
      width: 18px;
      height: 18px;
      color: #22c55e;
    }

    .logo {
      position: absolute;
      top: 32px;
      left: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
      z-index: 10;
    }

    .logo img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    @media (max-width: 640px) {
      .logo {
        position: static;
        margin-bottom: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="/leadflow.png" alt="LeadFlow" />
    <span>LeadFlow</span>
  </div>

  <div class="container">
    <h1>
      Your 24/7 AI Sales Team
    </h1>
    
    <p class="subtitle">
      Engage visitors instantly. Answer questions intelligently. Capture leads automatically.
    </p>

    <div class="cta-buttons">
      <button class="btn btn-primary" id="try-demo-btn">
        Chat with Demo
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
      <a href="https://lead-flow-roan.vercel.app" class="btn btn-secondary">
        View Dashboard
      </a>
    </div>

    <div class="features">
      <div class="feature">
        <svg class="check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>No signup required</span>
      </div>
      <div class="feature">
        <svg class="check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>Instant setup</span>
      </div>
      <div class="feature">
        <svg class="check-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span>Open source</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tryDemoBtn = document.getElementById('try-demo-btn');
      if (tryDemoBtn) {
        tryDemoBtn.addEventListener('click', () => {
          if (window.LeadFlowWidget && window.LeadFlowWidget.open) {
            window.LeadFlowWidget.open();
          }
        });
      }
    });
  </script>
</body>
</html>
